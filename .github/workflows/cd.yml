name: CD Pipeline

on:
  workflow_dispatch:

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    name: Build, publish, and deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Load deploy config
        run: |
          {
            echo "DOCKERHUB_USERNAME=${{ vars.DOCKERHUB_USERNAME }}"
            echo "SSH_HOST=${{ vars.SSH_HOST }}"
            echo "SSH_PORT=${{ secrets.SSH_PORT }}"
            echo "SSH_USER=${{ secrets.SSH_USER }}"
            echo "INFRA_DIR=${{ vars.INFRA_DIR }}"
            echo "HELM_RELEASE=${{ vars.HELM_RELEASE }}"
            echo "K8S_NAMESPACE=${{ vars.K8S_NAMESPACE }}"
            echo "NEXT_PUBLIC_WORKOUT_API_URL=${{ vars.NEXT_PUBLIC_WORKOUT_API_URL }}"
            echo "NEXT_PUBLIC_AUTH_API_URL=${{ vars.NEXT_PUBLIC_AUTH_API_URL }}"
            echo "NEXT_PUBLIC_STORAGE_URL=${{ vars.NEXT_PUBLIC_STORAGE_URL }}"
          } >> "$GITHUB_ENV"

      - name: Validate deploy config
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          test -n "$DOCKERHUB_USERNAME" || (echo "Missing DOCKERHUB_USERNAME in production environment variables" && exit 1)
          test -n "$DOCKERHUB_TOKEN" || (echo "Missing DOCKERHUB_TOKEN in production secrets" && exit 1)
          test -n "$SSH_HOST" || (echo "Missing SSH_HOST in production environment variables" && exit 1)
          test -n "$SSH_PORT" || (echo "Missing SSH_PORT in production secrets" && exit 1)
          test -n "$SSH_USER" || (echo "Missing SSH_USER in production secrets" && exit 1)
          test -n "$INFRA_DIR" || (echo "Missing INFRA_DIR in production environment variables" && exit 1)
          test -n "$HELM_RELEASE" || (echo "Missing HELM_RELEASE in production environment variables" && exit 1)
          test -n "$K8S_NAMESPACE" || (echo "Missing K8S_NAMESPACE in production environment variables" && exit 1)
          test -n "$NEXT_PUBLIC_WORKOUT_API_URL" || (echo "Missing NEXT_PUBLIC_WORKOUT_API_URL in production environment variables" && exit 1)
          test -n "$NEXT_PUBLIC_AUTH_API_URL" || (echo "Missing NEXT_PUBLIC_AUTH_API_URL in production environment variables" && exit 1)
          test -n "$NEXT_PUBLIC_STORAGE_URL" || (echo "Missing NEXT_PUBLIC_STORAGE_URL in production environment variables" && exit 1)
          test -n "$SSH_PRIVATE_KEY" || (echo "Missing SSH_PRIVATE_KEY in production secrets" && exit 1)

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/my-smart-workout-front
          tags: |
            type=sha
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_WORKOUT_API_URL=${{ env.NEXT_PUBLIC_WORKOUT_API_URL }}
            NEXT_PUBLIC_AUTH_API_URL=${{ env.NEXT_PUBLIC_AUTH_API_URL }}
            NEXT_PUBLIC_STORAGE_URL=${{ env.NEXT_PUBLIC_STORAGE_URL }}

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          SSH_DIR="$RUNNER_TEMP/ssh"
          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > "$SSH_DIR/id_ed25519"
          chmod 600 "$SSH_DIR/id_ed25519"
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> "$SSH_DIR/known_hosts"
          chmod 644 "$SSH_DIR/known_hosts"

      - name: Deploy frontend image
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          IMAGE="docker.io/${DOCKERHUB_USERNAME}/my-smart-workout-front:${IMAGE_TAG}"
          SSH_DIR="$RUNNER_TEMP/ssh"
          ssh -i "$SSH_DIR/id_ed25519" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o UserKnownHostsFile="$SSH_DIR/known_hosts" \
            -p "$SSH_PORT" "${SSH_USER}@${SSH_HOST}" \
            "INFRA_DIR='${INFRA_DIR}' HELM_RELEASE='${HELM_RELEASE}' K8S_NAMESPACE='${K8S_NAMESPACE}' IMAGE='${IMAGE}' bash -se" <<'EOF'
          set -euo pipefail

          if [ -d "$INFRA_DIR/.git" ]; then
            cd "$INFRA_DIR"
          elif [ -d "$HOME/$INFRA_DIR/.git" ]; then
            cd "$HOME/$INFRA_DIR"
          else
            echo "Infra repository not found: $INFRA_DIR (or $HOME/$INFRA_DIR)"
            exit 1
          fi

          git pull --ff-only origin main

          if ! helm status "$HELM_RELEASE" -n "$K8S_NAMESPACE" >/dev/null 2>&1; then
            echo "Helm release '$HELM_RELEASE' in namespace '$K8S_NAMESPACE' was not found."
            echo "Install the release once manually, then rerun CD."
            exit 1
          fi

          helm upgrade "$HELM_RELEASE" ./helm \
            --namespace "$K8S_NAMESPACE" \
            --reuse-values \
            --set "workoutFront.image=$IMAGE"

          kubectl rollout status deployment/workout-front-deployment \
            --namespace "$K8S_NAMESPACE" \
            --timeout=240s
          EOF
