name: CI Docker

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'pull_request'
    name: Build Image (PR)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: local/my-smart-workout-front
          tags: |
            type=ref,event=pr
            type=sha

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_WORKOUT_API_URL=${{ vars.NEXT_PUBLIC_WORKOUT_API_URL || 'https://workout-api.example.invalid' }}
            NEXT_PUBLIC_AUTH_API_URL=${{ vars.NEXT_PUBLIC_AUTH_API_URL || 'https://auth-api.example.invalid' }}
            NEXT_PUBLIC_STORAGE_URL=${{ vars.NEXT_PUBLIC_STORAGE_URL || 'https://storage.example.invalid' }}

  publish:
    if: github.event_name == 'push'
    name: Publish Image (Docker Hub)
    runs-on: ubuntu-latest
    environment: docker-publish
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
      NEXT_PUBLIC_WORKOUT_API_URL: ${{ vars.NEXT_PUBLIC_WORKOUT_API_URL || secrets.NEXT_PUBLIC_WORKOUT_API_URL }}
      NEXT_PUBLIC_AUTH_API_URL: ${{ vars.NEXT_PUBLIC_AUTH_API_URL || secrets.NEXT_PUBLIC_AUTH_API_URL }}
      NEXT_PUBLIC_STORAGE_URL: ${{ vars.NEXT_PUBLIC_STORAGE_URL || secrets.NEXT_PUBLIC_STORAGE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub and build args config
        run: |
          test -n "$DOCKERHUB_USERNAME"
          test -n "${{ secrets.DOCKERHUB_TOKEN }}"
          test -n "$NEXT_PUBLIC_WORKOUT_API_URL"
          test -n "$NEXT_PUBLIC_AUTH_API_URL"
          test -n "$NEXT_PUBLIC_STORAGE_URL"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/my-smart-workout-front
          tags: |
            type=sha
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_WORKOUT_API_URL=${{ env.NEXT_PUBLIC_WORKOUT_API_URL }}
            NEXT_PUBLIC_AUTH_API_URL=${{ env.NEXT_PUBLIC_AUTH_API_URL }}
            NEXT_PUBLIC_STORAGE_URL=${{ env.NEXT_PUBLIC_STORAGE_URL }}

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: publish
    name: Deploy To Production (Helm Over SSH)
    runs-on: ubuntu-latest
    environment: production
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
      SSH_HOST: ${{ vars.SSH_HOST || secrets.SSH_HOST }}
      SSH_PORT: ${{ vars.SSH_PORT || secrets.SSH_PORT || '2222' }}
      SSH_USER: ${{ vars.SSH_USER || secrets.SSH_USER }}
      INFRA_DIR: ${{ vars.INFRA_DIR || 'my-infra' }}
      HELM_RELEASE: ${{ vars.HELM_RELEASE || 'smart' }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'prod' }}
    steps:
      - name: Validate deploy config
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          test -n "$DOCKERHUB_USERNAME"
          test -n "$SSH_HOST"
          test -n "$SSH_PORT"
          test -n "$SSH_USER"
          test -n "$INFRA_DIR"
          test -n "$HELM_RELEASE"
          test -n "$K8S_NAMESPACE"
          test -n "$SSH_PRIVATE_KEY"

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy frontend image
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          IMAGE="docker.io/${DOCKERHUB_USERNAME}/my-smart-workout-front:${IMAGE_TAG}"
          ssh -p "$SSH_PORT" "${SSH_USER}@${SSH_HOST}" \
            "INFRA_DIR='${INFRA_DIR}' HELM_RELEASE='${HELM_RELEASE}' K8S_NAMESPACE='${K8S_NAMESPACE}' IMAGE='${IMAGE}' bash -se" <<'EOF'
          set -euo pipefail

          if [ -d "$INFRA_DIR/.git" ]; then
            cd "$INFRA_DIR"
          elif [ -d "$HOME/$INFRA_DIR/.git" ]; then
            cd "$HOME/$INFRA_DIR"
          else
            echo "Infra repository not found: $INFRA_DIR (or $HOME/$INFRA_DIR)"
            exit 1
          fi

          git pull --ff-only origin main

          if ! helm status "$HELM_RELEASE" -n "$K8S_NAMESPACE" >/dev/null 2>&1; then
            echo "Helm release '$HELM_RELEASE' in namespace '$K8S_NAMESPACE' was not found."
            echo "Install the release once manually, then rerun CD."
            exit 1
          fi

          helm upgrade "$HELM_RELEASE" ./helm \
            --namespace "$K8S_NAMESPACE" \
            --reuse-values \
            --set "workoutFront.image=$IMAGE"

          kubectl rollout status deployment/workout-front-deployment \
            --namespace "$K8S_NAMESPACE" \
            --timeout=240s
          EOF
